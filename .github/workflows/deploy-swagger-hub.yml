name: Deploy Swagger Hub

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  detect-changes:
    name: Detect spec changes
    runs-on: ubuntu-latest
    outputs:
      specs_sha:     ${{ steps.fetch.outputs.sha }}
      should_deploy: ${{ steps.decide.outputs.should_deploy }}

    steps:
      - name: Fetch latest commit SHA from openapi-specs
        id: fetch
        run: |
          sha=$(curl -fsSL \
            "https://api.github.com/repos/y-didenko/openapi-specs/commits/main" \
            | jq -r .sha)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "openapi-specs HEAD -> $sha"

      - name: Restore deployed-SHA cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .deployed
          key: deployed-${{ steps.fetch.outputs.sha }}

      - name: Decide whether to deploy
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true"  >> "$GITHUB_OUTPUT"
            echo "Reason: manual trigger"
          elif [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Already deployed: ${{ steps.fetch.outputs.sha }}"
          else
            echo "should_deploy=true"  >> "$GITHUB_OUTPUT"
            echo "New SHA: ${{ steps.fetch.outputs.sha }}"
          fi

  build:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout swagger-hub
        uses: actions/checkout@v4

      - name: Checkout openapi-specs at detected SHA
        uses: actions/checkout@v4
        with:
          repository: y-didenko/openapi-specs
          ref: ${{ needs.detect-changes.outputs.specs_sha }}
          path: _specs

      - name: Build static site
        run: |
          mkdir -p dist

          npm install --prefix /tmp/sui swagger-ui-dist --no-fund --silent
          SUI=/tmp/sui/node_modules/swagger-ui-dist
          cp "$SUI/swagger-ui.css"                  \
             "$SUI/index.css"                       \
             "$SUI/swagger-ui-bundle.js"            \
             "$SUI/swagger-ui-standalone-preset.js" \
             "$SUI/index.html"                      \
             "$SUI/oauth2-redirect.html"            \
             "$SUI/favicon-16x16.png"               \
             "$SUI/favicon-32x32.png"               \
             dist/

          cp -r _specs/services dist/specs

          python3 scripts/gen_initializer.py

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  record:
    name: Record deployed SHA
    needs: [detect-changes, build, deploy]
    if: needs.build.result == 'success' && needs.deploy.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - run: echo "${{ needs.detect-changes.outputs.specs_sha }}" > .deployed

      - uses: actions/cache/save@v4
        with:
          path: .deployed
          key: deployed-${{ needs.detect-changes.outputs.specs_sha }}
